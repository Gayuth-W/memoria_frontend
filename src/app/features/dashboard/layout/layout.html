<div class="dashboard-container">
  <aside class="sidebar glass-panel">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">M</div>
      </div>
      <h2>Memoria</h2>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/dashboard/sessions" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📚</span>
        <span class="nav-text">Sessions</span>
      </a>
      <a routerLink="/dashboard/memories" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🧠</span>
        <span class="nav-text">All Memories</span>
      </a>
      <a routerLink="/dashboard/search" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🔍</span>
        <span class="nav-text">Search Engine</span>
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span class="nav-text">Disconnect</span>
      </button>
    </div>
  </aside>
  
  <main class="main-content">
    <div class="top-bar glass-panel">
      <div class="breadcrumb">Dashboard Overview</div>
      <div class="user-status">
        <div class="status-dot online"></div>
        <span>Connected</span>
      </div>
    </div>
    
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
